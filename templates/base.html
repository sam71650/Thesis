{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Thesis Portal{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink-light: #fdf2f8;
      --pink-mid:   #fce7f3;
      --pink:       #f472b6;
      --pink-dark:  #ec4899;
      --purple:     #a855f7;
      --deep:       #4a1942;
      --white:      #ffffff;
      --muted:      #7c5a7e;
      --surface:    rgba(255,255,255,0.72);
      --border:     rgba(168,85,247,0.18);
      --grad-main:  linear-gradient(135deg, #fdf2f8 0%, #f3e8ff 45%, #fce7f3 100%);
      --grad-accent: linear-gradient(135deg, #f472b6, #a855f7, #7c3aed);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--grad-main);
      min-height: 100vh;
      color: var(--deep);
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 800px 600px at 80% -10%, rgba(244,114,182,.22) 0%, transparent 70%),
        radial-gradient(ellipse 600px 500px at -10% 80%, rgba(168,85,247,.14) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── NAVBAR ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 3rem;
      height: 68px;
      background: rgba(255,255,255,0.62);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 2px 24px rgba(168,85,247,.07);
    }

    .nav-brand {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.15rem;
      letter-spacing: -.02em;
      background: var(--grad-accent);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: .25rem;
      list-style: none;
      align-items: center;
    }

    .nav-links a {
      font-size: .875rem;
      font-weight: 500;
      color: var(--purple);
      text-decoration: none;
      padding: .45rem .9rem;
      border-radius: 8px;
      transition: background .2s, color .2s;
    }
    .nav-links a:hover { background: rgba(244,114,182,.13); color: var(--deep); }

    .btn-login {
      background: transparent;
      border: 1.5px solid var(--pink-dark);
      color: var(--pink-dark) !important;
      border-radius: 10px !important;
    }
    .btn-login:hover { background: rgba(236,72,153,.08) !important; }

    .btn-register {
      background: var(--grad-accent) !important;
      color: #fff !important;
      border-radius: 10px !important;
      box-shadow: 0 4px 14px rgba(168,85,247,.35);
    }
    .btn-register:hover { filter: brightness(1.08); }

    /* ── CONTENT ── */
    main {
      position: relative;
      z-index: 1;
      flex: 1;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      padding: 5rem 2rem 4rem;
    }

    /* ── FOOTER ── */
    footer {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(14px);
      border-top: 1px solid var(--border);
      padding: 2rem 3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .footer-left { display: flex; align-items: center; gap: .75rem; }
    .footer-logo { height: 36px; width: auto; object-fit: contain; }

    .footer-brand {
      font-family: 'Syne', sans-serif;
      font-size: .85rem;
      font-weight: 700;
      color: var(--deep);
    }
    .footer-brand span {
      display: block;
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: .75rem;
      color: var(--muted);
    }
    .footer-right { font-size: .8rem; color: var(--muted); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      nav { padding: 0 1.25rem; }
      main { padding: 3rem 1.25rem 3rem; }
      footer { padding: 1.5rem 1.25rem; }
    }

    {% block extra_css %}{% endblock %}
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <a href="{% url 'home' %}" class="nav-brand">Thesis Portal</a>
    <ul class="nav-links">
      <li><a href="#">About</a></li>
      <li><a href="#">Research</a></li>
      <li><a href="{% url 'users:login' %}" class="btn-login">Log in</a></li>
      <li><a href="{% url 'users:register' %}" class="btn-register">Register</a></li>
    </ul>
  </nav>

  <!-- PAGE CONTENT -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- FOOTER -->
  <footer>
    <div class="footer-left">
      <img src="{% static 'images/logo.png' %}" alt="Logo" class="footer-logo" />
      <div class="footer-brand">
        Thesis Portal
        <span>Master Thesis · Spring 2026</span>
      </div>
    </div>
    <div class="footer-right">
      © 2026 Master Thesis Portal. All rights reserved.
    </div>
  </footer>

</body>
</html>
